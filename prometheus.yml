# =============================================================
#  Configuración de Prometheus - M&M Studio TFG ASIR
#  Prometheus recoge métricas cada 15 segundos del exportador
#  de Nginx y de sí mismo
# =============================================================

global:
  scrape_interval: 15s        # cada 15s pide métricas
  evaluation_interval: 15s    # cada 15s evalúa las reglas

scrape_configs:

  # Métricas del propio Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métricas de Nginx (peticiones, conexiones, errores...)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
