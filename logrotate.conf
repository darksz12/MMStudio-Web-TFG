# =============================================================
#  Rotación de logs - M&M Studio TFG ASIR
#
#  Uso manual:   logrotate -f logrotate.conf
#  Automatizar:  copiar a /etc/logrotate.d/mmstudio
#
#  Los logs de Nginx se guardan en ./logs/ (volumen Docker)
#  Esta configuración rota los archivos cada día, guarda 7 días
#  y los comprime para ahorrar espacio.
# =============================================================

/ruta/al/proyecto/logs/access.log
/ruta/al/proyecto/logs/error.log {
    daily                    # rotar cada día
    rotate 7                 # guardar los últimos 7 archivos
    compress                 # comprimir con gzip
    delaycompress            # comprimir el de ayer (no el de hoy)
    missingok                # no dar error si el archivo no existe
    notifempty               # no rotar si está vacío
    sharedscripts

    postrotate
        # Decirle a Nginx que reabra los ficheros de log
        docker exec mmstudio_nginx nginx -s reopen 2>/dev/null || true
    endscript
}
