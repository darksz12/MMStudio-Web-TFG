# =============================================================
# DOCKER COMPOSE — M&M Studio
#
# Este archivo define y orquesta los 6 contenedores del proyecto.
# Con un solo comando (docker compose up -d --build) se construyen
# las imágenes y se arrancan todos los servicios.
#
# "restart: unless-stopped" en todos los servicios significa que si
# el servidor se reinicia o un contenedor cae, Docker lo levanta solo
# sin que haya que intervenir manualmente.
#
# Los servicios se comunican entre ellos por la red interna de Docker
# usando el nombre del servicio como hostname (ej: "api", "db", "nginx").
# Solo Nginx tiene puertos abiertos al exterior (80 y 443).
# =============================================================

services:

  # ---- SERVIDOR WEB — Nginx ----
  # Se construye con el Dockerfile de la raíz del proyecto.
  # Ese Dockerfile parte de nginx:alpine y copia todos los archivos de la web dentro.
  # Por eso hay que hacer --build cada vez que se actualiza el código.
  nginx:
    build: .
    container_name: mmstudio_nginx
    ports:
      - "80:80"      # HTTP — solo para redirigir a HTTPS
      - "443:443"    # HTTPS con certificado real de Let's Encrypt
    volumes:
      - ./backups:/backups                        # directorio de backups en el host
      - ./logs:/var/log/nginx                     # logs de Nginx accesibles desde el host
      - /etc/letsencrypt:/etc/letsencrypt:ro      # certificado SSL (solo lectura, está en el host)
    restart: unless-stopped

  # ---- BASE DE DATOS — MySQL ----
  # Contenedor oficial de MySQL 8. Almacena todos los usuarios y datos del negocio.
  # db_data es un volumen con nombre gestionado por Docker: los datos persisten
  # aunque se reconstruya o elimine el contenedor.
  # La API se conecta a este contenedor usando "db" como hostname (DNS interno de Docker).
  db:
    image: mysql:8.0
    container_name: mmstudio_db
    environment:
      - MYSQL_ROOT_PASSWORD=root_mmstudio_2025   # contraseña del superusuario de MySQL
      - MYSQL_DATABASE=mmstudio                  # base de datos que se crea automáticamente
      - MYSQL_USER=mmstudio                      # usuario de la aplicación
      - MYSQL_PASSWORD=mmstudio_pass             # contraseña del usuario de la aplicación
    ports:
      - "3306:3306"                              # expone MySQL al host para conectarse con Workbench/TablePlus
    volumes:
      - db_data:/var/lib/mysql                   # aquí guarda MySQL sus ficheros internos
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "mmstudio", "-pmmstudio_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- BACKEND — API Node.js + MySQL ----
  # Se construye con Dockerfile.api. No tiene puertos externos;
  # solo es accesible desde dentro de Docker (Nginx le habla como "api:3001").
  # Espera a que el contenedor "db" supere su healthcheck antes de arrancar.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: mmstudio_api
    environment:
      - JWT_SECRET=mmstudio-jwt-secret-2025  # secreto para firmar los tokens JWT
      - GROQ_KEY=${GROQ_KEY}                 # clave Groq — viene del .env del VPS, nunca va a GitHub
      - DB_HOST=db                           # hostname del contenedor MySQL (DNS interno Docker)
      - DB_USER=mmstudio                     # usuario de la base de datos
      - DB_PASSWORD=mmstudio_pass            # contraseña de la base de datos
      - DB_NAME=mmstudio                     # nombre de la base de datos
    depends_on:
      db:
        condition: service_healthy           # espera a que MySQL esté listo antes de arrancar
    restart: unless-stopped

  # ---- EXPORTADOR DE MÉTRICAS — nginx-prometheus-exporter ----
  # Se conecta a /stub_status de Nginx y convierte los contadores internos
  # (conexiones activas, peticiones totales, etc.) al formato que entiende Prometheus.
  # Sin este exportador, Prometheus no podría leer las métricas de Nginx.
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: mmstudio_nginx_exporter
    command: --nginx.scrape-uri=http://nginx:80/stub_status  # URL de las métricas internas de Nginx
    depends_on:
      - nginx     # espera a que Nginx esté arriba antes de arrancar
    restart: unless-stopped

  # ---- PROMETHEUS — recolector de métricas ----
  # Cada 15 segundos hace una petición al exportador y guarda los valores con su timestamp.
  # La configuración de qué scrape (de dónde recoger métricas) está en prometheus.yml.
  # prometheus_data es un volumen con nombre para que los datos históricos no se pierdan.
  prometheus:
    image: prom/prometheus:latest
    container_name: mmstudio_prometheus
    ports:
      - "9090:9090"   # panel web de Prometheus (http://localhost:9090 desde el VPS)
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro  # configuración de scraping
      - prometheus_data:/prometheus                          # datos históricos persistentes
    restart: unless-stopped

  # ---- GRAFANA — visualización de métricas ----
  # Lee los datos de Prometheus y los muestra en dashboards con gráficas.
  # El provisioning automático (carpeta grafana/provisioning) configura el datasource
  # y carga el dashboard de Nginx al arrancar, sin necesidad de configuración manual.
  # grafana_data guarda los dashboards y ajustes aunque se reconstruya el contenedor.
  grafana:
    image: grafana/grafana:latest
    container_name: mmstudio_grafana
    ports:
      - "3000:3000"   # panel web de Grafana (http://localhost:3000 desde el VPS)
    volumes:
      - grafana_data:/var/lib/grafana                          # dashboards y config persistentes
      - ./grafana/provisioning:/etc/grafana/provisioning       # datasource automático (Prometheus)
      - ./grafana/dashboards:/etc/grafana/dashboards           # dashboard de Nginx pre-cargado
    environment:
      - GF_SECURITY_ADMIN_USER=admin          # usuario de acceso a Grafana
      - GF_SECURITY_ADMIN_PASSWORD=mmstudio123  # contraseña de Grafana
    depends_on:
      - prometheus    # espera a que Prometheus esté arriba antes de arrancar
    restart: unless-stopped

# =============================================================
# VOLÚMENES CON NOMBRE
# Docker los gestiona él solo. Sobreviven a docker compose down y a --build.
# Son distintos de los bind mounts (./logs, ./backups) que usan carpetas del host.
# =============================================================
volumes:
  prometheus_data:   # datos históricos de Prometheus (métricas acumuladas)
  grafana_data:      # dashboards y configuración de Grafana
  db_data:           # base de datos MySQL con todos los usuarios y datos del negocio
