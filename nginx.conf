# Configuración Nginx para M&M Studio
# Redirige HTTP → HTTPS y sirve con cabeceras de seguridad

server {
    listen 80;
    server_name mymstudio.duckdns.org;

    # Métricas para Prometheus (solo accesible desde la red interna Docker)
    location /stub_status {
        stub_status;
        allow 172.16.0.0/12;   # rango de redes internas Docker
        allow 10.0.0.0/8;
        deny all;
    }

    # Todo lo demás redirige a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mymstudio.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/mymstudio.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mymstudio.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index inicio.html index.html;

    # ---- Logs centralizados (montados como volumen en docker-compose) ----
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---- Cabeceras de seguridad ----
    add_header X-Frame-Options            "SAMEORIGIN"                       always;
    add_header X-Content-Type-Options     "nosniff"                          always;
    add_header X-XSS-Protection           "1; mode=block"                    always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"  always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ---- Compresión gzip ----
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_vary       on;

    # ---- auth.js nunca se cachea (cambia con frecuencia) ----
    location = /auth.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---- Caché de recursos estáticos ----
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|mp4|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ---- Proxy a la API backend ----
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Página de error personalizada ----
    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
