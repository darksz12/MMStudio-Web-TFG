# =============================================================
# CONFIGURACIÓN DE NGINX — M&M Studio
#
# Nginx tiene dos funciones principales en este proyecto:
#   1. Servidor web: sirve los archivos estáticos (HTML, CSS, imágenes, JS)
#   2. Proxy inverso: redirige las peticiones /api/ al backend Node.js
#
# También se encarga de:
#   - Forzar HTTPS en todas las conexiones
#   - Añadir cabeceras de seguridad
#   - Comprimir las respuestas con gzip
#   - Gestionar la caché de recursos estáticos
# =============================================================


# =============================================================
# BLOQUE 1 — Puerto 80 (HTTP)
# Solo sirve para redirigir todo el tráfico a HTTPS.
# La única excepción es /stub_status, que expone métricas internas
# de Nginx para que el exportador de Prometheus pueda leerlas.
# =============================================================
server {
    listen 80;
    server_name mymstudio.duckdns.org;

    # /stub_status expone contadores internos de Nginx (conexiones, peticiones...).
    # Solo se permite el acceso desde las IPs internas de Docker (no desde internet).
    location /stub_status {
        stub_status;
        allow 172.16.0.0/12;   # rango de redes internas Docker
        allow 10.0.0.0/8;
        deny all;              # cualquier otra IP queda bloqueada
    }

    # Todo lo demás se redirige a HTTPS con código 301 (redirección permanente).
    # El navegador recordará que este dominio siempre usa HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}


# =============================================================
# BLOQUE 2 — Puerto 443 (HTTPS)
# Aquí ocurre todo: sirve la web, aplica seguridad y redirige la API.
# =============================================================
server {
    listen 443 ssl;
    server_name mymstudio.duckdns.org;

    # Certificado SSL real obtenido con Let's Encrypt + Certbot.
    # fullchain.pem = certificado + cadena de certificación
    # privkey.pem   = clave privada del certificado
    # El directorio /etc/letsencrypt se monta como volumen de solo lectura en Docker.
    ssl_certificate     /etc/letsencrypt/live/mymstudio.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mymstudio.duckdns.org/privkey.pem;

    # Solo se aceptan versiones modernas y seguras de TLS.
    # TLS 1.0 y 1.1 están obsoletos y tienen vulnerabilidades conocidas.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Directorio donde están todos los archivos estáticos de la web.
    # Están "horneados" dentro de la imagen Docker al hacer --build.
    root  /usr/share/nginx/html;
    index inicio.html index.html;

    # Logs centralizados. El directorio ./logs es un volumen montado en el host,
    # por lo que los logs son accesibles desde fuera del contenedor.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ---- CABECERAS DE SEGURIDAD ----
    # Se añaden a todas las respuestas para proteger al usuario.

    # X-Frame-Options: impide que la web se incruste en un iframe de otro dominio.
    # Protege contra ataques de clickjacking (hacer clic en algo invisible).
    add_header X-Frame-Options            "SAMEORIGIN"                       always;

    # X-Content-Type-Options: evita que el navegador adivine el tipo de archivo
    # si no coincide con el Content-Type declarado. Previene ataques XSS.
    add_header X-Content-Type-Options     "nosniff"                          always;

    # X-XSS-Protection: activa el filtro anti-XSS en navegadores antiguos.
    add_header X-XSS-Protection           "1; mode=block"                    always;

    # Referrer-Policy: controla qué información se envía al navegar a otros sitios.
    add_header Referrer-Policy            "strict-origin-when-cross-origin"  always;

    # HSTS: le dice al navegador que durante 1 año debe usar siempre HTTPS en este dominio,
    # aunque el usuario escriba HTTP. Previene ataques de downgrade.
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # Permissions-Policy: desactiva explícitamente el acceso a cámara, micrófono
    # y geolocalización, ya que la web no los necesita.
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;

    # ---- COMPRESIÓN GZIP ----
    # Comprime las respuestas antes de enviarlas al navegador.
    # Reduce el tamaño de transferencia de CSS, JS y JSON hasta un 70-80%.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;  # solo comprime archivos mayores de 1KB
    gzip_vary       on;    # indica al navegador que la respuesta puede variar según Accept-Encoding

    # ---- auth.js nunca se cachea ----
    # auth.js cambia con frecuencia durante el desarrollo, así que le decimos
    # al navegador que no lo guarde en caché y siempre pida la versión más nueva.
    location = /auth.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ---- Caché de recursos estáticos ----
    # Imágenes, CSS, JS y vídeos se cachean 7 días en el navegador.
    # Así el usuario no tiene que descargarlos en cada visita, la web carga más rápido.
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|mp4|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ---- PROXY INVERSO hacia el backend ----
    # Cualquier petición que empiece por /api/ se redirige al contenedor de Node.js.
    # El usuario nunca habla directamente con el backend; siempre pasa por Nginx.
    # "api" es el nombre del servicio en docker-compose.yml, Docker lo resuelve como hostname.
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;               # mantiene el host original
        proxy_set_header X-Real-IP $remote_addr;   # pasa la IP real del cliente al backend
    }

    # Página de error 404 personalizada
    error_page 404 /404.html;

    # Sirve los archivos estáticos. Si el archivo no existe → 404.
    location / {
        try_files $uri $uri/ =404;
    }
}
